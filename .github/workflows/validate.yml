name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Check generated manifests
        run: python3 scripts/generate_manifests.py --check
      - name: Validate skills and packaging
        run: python3 scripts/validate_repo.py
