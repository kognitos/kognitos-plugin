name: PR Review

# Triggered when the review team is requested on a PR.
# To re-review: remove the team reviewer, then add it back.
#
# Setup: create a GitHub team (e.g. "plugin-review") and set
# REVIEW_TEAM below. Also requires ANTHROPIC_API_KEY in secrets.

on:
  pull_request:
    types: [review_requested]

env:
  REVIEW_TEAM: plugin-review

permissions:
  checks: read

jobs:
  review:
    name: PR Review
    # Only run when the configured team is requested
    if: github.event.requested_team.slug == 'plugin-review'
    runs-on: ubuntu-latest
    concurrency:
      group: pr-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.SEMVER_APP_ID }}
          private-key: ${{ secrets.SEMVER_APP_PRIVATE_KEY }}

      - name: Wait for validate to pass
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Waiting for Validate check..."
          for i in $(seq 1 20); do
            STATUS=$(gh api "repos/${REPO}/commits/${SHA}/check-runs" \
              --jq '[.check_runs[] | select(.name == "validate")] | first | .status // "not_found"')

            if [ "$STATUS" = "completed" ]; then
              CONCLUSION=$(gh api "repos/${REPO}/commits/${SHA}/check-runs" \
                --jq '[.check_runs[] | select(.name == "validate")] | first | .conclusion')
              if [ "$CONCLUSION" = "success" ]; then
                echo "Validate passed."
                break
              else
                echo "Validate failed ($CONCLUSION). Skipping review."
                exit 1
              fi
            fi

            echo "Validate status: $STATUS. Waiting 15s... (attempt $i/20)"
            sleep 15
          done

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve PR
        id: resolve
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

          PR_JSON=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefName,title,author)
          echo "$PR_JSON" | jq -r '.title' > /tmp/pr-title.txt
          echo "$PR_JSON" | jq -r '.author.login' > /tmp/pr-author.txt

          gh pr diff "$PR_NUMBER" --repo "$REPO" --name-only > /tmp/changed-files.txt || true
          gh pr diff "$PR_NUMBER" --repo "$REPO" > /tmp/pr-diff.txt

          echo "=== Changed files ==="
          cat /tmp/changed-files.txt
          echo "Diff size: $(wc -c < /tmp/pr-diff.txt) bytes"

          # Dismiss stale bot reviews
          gh api "repos/${REPO}/pulls/${PR_NUMBER}/reviews" --paginate \
            --jq '.[] | select(.user.login | endswith("[bot]")) |
              select(.state == "CHANGES_REQUESTED" or .state == "APPROVED" or .state == "COMMENTED") | .id' \
          | xargs -I{} gh api --method PUT \
              "repos/${REPO}/pulls/${PR_NUMBER}/reviews/{}/dismissals" \
              -f message="Re-reviewing." 2>/dev/null || true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.resolve.outputs.pr_number }}
        run: |
          PR_TITLE=$(cat /tmp/pr-title.txt)
          PR_AUTHOR=$(cat /tmp/pr-author.txt)

          cat > /tmp/review-task.md << TASK_EOF
          # Plugin PR Review

          You are reviewing PR #${PR_NUMBER} ("${PR_TITLE}") by ${PR_AUTHOR} on kognitos/kognitos-plugin.
          The repo is checked out at the current directory. The PR diff is at /tmp/pr-diff.txt.
          Changed files are at /tmp/changed-files.txt.

          ## Scope

          **Only review files that appear in the PR diff.** Do not report issues in
          unchanged files. If you read other files for context, do not flag issues in them.

          ## Review Protocol

          ### Phase 1: Context

          1. Read /tmp/changed-files.txt for the file list
          2. Read /tmp/pr-diff.txt for the actual changes
          3. For each changed file, read the full file from the repo

          ### Phase 2: Analysis

          For each changed file, check the **changed lines** against these rules:

          #### Skill Structure
          - SKILL.md has frontmatter with name and description fields
          - Frontmatter name matches the directory name
          - Each skill directory has a references/ subdirectory
          - Internal markdown links resolve to existing files

          #### API Documentation
          - curl examples use environment variable placeholders (not hardcoded values)
          - Base URL uses the parametric pattern
          - No real tokens, org IDs, workspace IDs, or user IDs in examples
          - Run states: awaiting_guidance is recoverable (not failed), failed is terminal

          #### Manifest Conformance
          - If package.json version changed, all 4 manifests must be updated
          - marketplace.json follows the Claude Code schema (name, owner, metadata, plugins)
          - plugin.json has name, version, description at minimum

          #### Terminology
          - "automation" not "workflow" or "process"
          - "run" not "execution"
          - "exception" not "error" (for the Kognitos exception system)
          - "guidance" not "fix" or "resolution"
          - "integration" not "book" or "connector" (in user-facing docs)
          - "connection" not "integration instance"
          - "awaiting guidance" not "failed" (for runs paused on exceptions)

          #### Content Quality
          - No hardcoded secrets, tokens, or internal URLs
          - Cross-references between skills point to correct files
          - No TODO/FIXME/HACK comments

          ### Phase 3: Post Review

          Use gh CLI to post your review.

          Inline comments (max 10): write to /tmp/review-comments.json as an array of
          {path, line, side: "RIGHT", body}. If no issues, use [].

          Submit:
          \`\`\`bash
          jq -n \\
            --arg body "Review summary here" \\
            --arg event "APPROVE" \\
            --argjson comments "\$(cat /tmp/review-comments.json)" \\
            '{body: \$body, event: \$event, comments: \$comments}' \\
          | gh api "repos/kognitos/kognitos-plugin/pulls/${PR_NUMBER}/reviews" \\
              --method POST --input -
          \`\`\`

          Verdict:
          - APPROVE: clean changes, minor notes in summary
          - REQUEST_CHANGES: broken links, secrets, wrong semantics, missing frontmatter
          - COMMENT: only when genuinely uncertain

          Prefer APPROVE with notes over COMMENT. Be direct.
          TASK_EOF

          claude --print \
            --model sonnet \
            --max-turns 20 \
            "$(cat /tmp/review-task.md)" || {
              echo "::warning::Review agent completed with errors"
            }
